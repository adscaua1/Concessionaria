<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concessionária</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="./img/icon.png" type="image/x-icon">
</head>

<body>

    <!-- Vídeo de fundo -->
    <div class="video-bg">
        <video autoplay loop muted playsinline>
            <source
                src="../img/video 911.mp4"
                type="application/x-mpegURL">
        </video>
    </div>

    <!-- MENU LATERAL -->
    <aside class="sidebar">
        <h1>🔥 Vrum Motors</h1>
        <ul>
            <li><a href="#">Início</a></li>
            <li><a href="#">Carros</a></li>
            <li><a href="#">Motos</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </aside>

    <!-- CONTEÚDO -->
    <main class="conteudo">
        <h2>🔥 Mais Vendidos</h2>
        <div class="veiculos">

            <div class="veiculo">
                <img src="./img/mercedes-amg-c-63-4-1920x1081.jpg" alt="Carro 1">
                <h3>Carro Esportivo</h3>
                <p>Motor 2.0 turbo, 4 portas, automático.</p>
                <div class="preco">R$ 120.000</div>
                <button>Comprar</button>
            </div>

            <div class="veiculo">
                <img src="https://via.placeholder.com/300x200?text=Carro+2" alt="Carro 2">
                <h3>SUV Familiar</h3>
                <p>Espaçoso, 7 lugares, motor 2.5.</p>
                <div class="preco">R$ 150.000</div>
                <button>Comprar</button>
            </div>

            <div class="veiculo">
                <img src="https://via.placeholder.com/300x200?text=Moto+1" alt="Moto 1">
                <h3>Moto Esportiva</h3>
                <p>600cc, design moderno.</p>
                <div class="preco">R$ 35.000</div>
                <button>Comprar</button>
            </div>

            <div class="veiculo">
                <img src="https://via.placeholder.com/300x200?text=Moto+2" alt="Moto 2">
                <h3>Moto Urbana</h3>
                <p>125cc, econômica.</p>
                <div class="preco">R$ 15.000</div>
                <button>Comprar</button>
            </div>

        </div>
    </main>

    <script src="./js/api-car.js"></script>
    <script>
        // Chama a função do api.js
        getBrands().then(marcas => {
            const ul = document.getElementById("lista-marcas");
            marcas.forEach(marca => {
                const li = document.createElement("li");
                li.textContent = marca.name;
                ul.appendChild(li);
            });
        });
    </script>
</body>

</html>
